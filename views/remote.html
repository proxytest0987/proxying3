<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Remote</title>
  <style>
    body{margin:0;font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans JP",sans-serif;background:#0b1020;color:#e8ecff}
    .bar{display:flex;gap:8px;align-items:center;padding:10px;background:#111a33;position:sticky;top:0}
    .bar input{flex:1 1 auto;min-width:200px;padding:10px;border-radius:10px;border:1px solid #31406b;background:#0e152b;color:#e8ecff}
    .bar button{padding:10px 14px;border-radius:10px;border:0;background:#4a6fff;color:#fff;cursor:pointer}
    .stage{display:grid;place-items:center;padding:10px}
    #view{max-width:100%;height:auto;border:1px solid #31406b;border-radius:12px;background:#000}
    .keys{padding:8px;display:flex;gap:8px}
    .keys button{padding:8px 12px;border-radius:8px;border:1px solid #31406b;background:#0e152b;color:#e8ecff;cursor:pointer}
  </style>
</head>
<body>
  <div class="bar">
    <input id="url" placeholder="https://www.instagram.com/" value="https://www.instagram.com/">
    <button id="connect">Connect</button>
    <button id="goto">Go</button>
    <button id="disconnect">Disconnect</button>
  </div>
  <div class="stage">
    <img id="view" alt="frame"/>
  </div>
  <div class="keys">
    <button data-key="Enter">Enter</button>
    <button data-key="Escape">Esc</button>
    <button data-key="Tab">Tab</button>
    <button data-key="Backspace">Backspace</button>
  </div>
  <script>
    let ws = null;
    const img = document.getElementById('view');
    const url = document.getElementById('url');

    function send(obj){ if(ws && ws.readyState===1) ws.send(JSON.stringify(obj)); }
    function connect(){
      if(ws && ws.readyState===1) return;
      ws = new WebSocket((location.protocol==='https:'?'wss':'ws')+'://'+location.host+'/ig/ws');
      ws.onopen = ()=> console.log('ws open');
      ws.onclose = ()=> console.log('ws close');
      ws.onmessage = (e)=>{
        const m = JSON.parse(e.data);
        if(m.type==='frame') img.src = m.data;
      };
    }
    function disconnect(){ if(ws){ try{ws.close();}catch{} ws=null; } }
    function go(){ send({type:'goto', url: url.value.trim()}); }

    document.getElementById('connect').onclick = connect;
    document.getElementById('disconnect').onclick = disconnect;
    document.getElementById('goto').onclick = go;

    img.addEventListener('click', (e)=>{
      const r = img.getBoundingClientRect();
      const x = e.clientX - r.left;
      const y = e.clientY - r.top;
      send({type:'click', x, y, w: r.width, h: r.height});
    });

    document.addEventListener('keydown', (e)=>{
      if(!ws || ws.readyState!==1) return;
      if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) send({type:'type', text:e.key});
      else send({type:'key', key:e.key});
    });
    document.querySelectorAll('.keys button').forEach(b=> b.onclick = ()=> send({type:'key', key:b.dataset.key}));

    window.addEventListener('beforeunload', ()=> send({type:'stop'}));
  </script>
</body>
</html>
